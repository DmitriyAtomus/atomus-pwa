<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AtomBreez-1 — 3D просмотр</title>
<!--
  Автономный 3D-просмотрщик изделия AtomBreez-1 (облегчённая версия).
  Встраивание в CRM:
    1) Положить файл в статику, напр. /static/3d/humidifier_viewer.html
    2) В разделе/карточке изделия вставить:
         <iframe src="/static/3d/humidifier_viewer.html"
                 style="width:100%;height:640px;border:0;border-radius:12px"></iframe>
  Закрытый контур без интернета: скачать three.min.js локально и заменить src ниже.
  Это концепт-модель (облик и компоновка), не CAD/STEP.
-->
<style>
  :root{
    --bg:#eef0f2; --panel:#ffffff; --panel2:#f1f3f5; --panel3:#e4e7ea;
    --border:#d4d8dc; --text:#1f2429; --text2:#5b636b; --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:transparent}
  .wrap{max-width:980px;margin:0 auto;padding:12px}
  #scene{width:100%;height:560px;background:var(--bg);border-radius:var(--radius);cursor:grab;touch-action:none;display:block}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;font-size:13px}
  button{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--panel);cursor:pointer;color:var(--text);font-size:13px}
  button:hover{background:var(--panel2)}
  button.on{background:var(--panel3)}
  .hint{margin-left:auto;color:var(--text2);align-self:center}
  .legend{display:flex;gap:10px 16px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--text2)}
  .legend .it{display:flex;align-items:center;gap:6px}
  .legend .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
  <canvas id="scene"></canvas>
  <div class="row">
    <button id="rot" class="on">⏸ Вращение</button>
    <button data-v="iso">Изометрия</button>
    <button data-v="front">Спереди</button>
    <button data-v="rightS">Сбоку (подвод)</button>
    <button data-v="top">Сверху</button>
  </div>
  <div class="row">
    <button id="proc" class="on">⏸ Туман и вода</button>
    <button id="open">↑ Открыть переход</button>
    <button id="disc">⤴ Достать каплеуловитель</button>
    <button id="pan">⇥ Выдвинуть поддон</button>
    <button id="cut">Прозрачный корпус</button>
    <span class="hint">тяни — вращать · колесо — зум</span>
  </div>
  <div class="legend" id="legend"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const host=document.getElementById('scene');
function size(){return [host.clientWidth, 560];}
let [W,H]=size();
const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(40,W/H,0.05,100);
const rnd=new THREE.WebGLRenderer({canvas:host,antialias:true,alpha:true});
rnd.setSize(W,H,false);rnd.setPixelRatio(Math.min(devicePixelRatio,2));
const pmrem=new THREE.PMREMGenerator(rnd);const es=new THREE.Scene();es.background=new THREE.Color(0xeef0f2);es.add(new THREE.HemisphereLight(0xffffff,0xc4c8cc,1));scene.environment=pmrem.fromScene(es,0.04).texture;
scene.add(new THREE.AmbientLight(0xffffff,0.74));
const d1=new THREE.DirectionalLight(0xffffff,0.66);d1.position.set(7,12,8);scene.add(d1);
const d2=new THREE.DirectionalLight(0xffffff,0.38);d2.position.set(-6,5,-7);scene.add(d2);

const C={corpus:0x2f4d72,kreplenie:0x3a5170,collector:0x3f6e78,forsun:0x5a8e95,podvod:0x2f6285,brs:0x8c8276,shlang:0x2c333a,disk:0x6a7488,perehod:0x4a5b6e,vent:0x2a3138,homut:0x6f6a60,rama:0x6c7378,naprav:0x55656f,poddon:0x2b3036,kran:0x8f4a45,kolesa:0x202428};
const LEG=[['corpus','Труба (корпус) Ø400'],['kreplenie','Кольцо крепления'],['collector','Кольцо-коллектор'],['forsun','Форсунки (5 шт)'],['podvod','Трубка подвода'],['brs','Быстросъём (БРС)'],['shlang','Шланг'],['disk','Каплеуловитель (диск)'],['perehod','Переход Ø400→150'],['vent','Вентилятор'],['homut','Хомут'],['rama','Рама'],['naprav','Направляющие'],['poddon','Поддон'],['kran','Кран слива'],['kolesa','Колёса']];
const legEl=document.getElementById('legend');LEG.forEach(([k,t])=>{const d=document.createElement('div');d.className='it';const s=document.createElement('span');s.className='sw';s.style.background='#'+C[k].toString(16).padStart(6,'0');d.appendChild(s);const l=document.createElement('span');l.textContent=t;d.appendChild(l);legEl.appendChild(d);});
function M(col,opt){return new THREE.MeshStandardMaterial(Object.assign({color:col,metalness:0.25,roughness:0.52,side:THREE.DoubleSide},opt||{}));}
const matCorpus=M(C.corpus), matCorpusT=M(C.corpus,{transparent:true,opacity:0.12}), matCorpusP=M(C.corpus,{transparent:true,opacity:0.28});
const matKrep=M(C.kreplenie), matColl=M(C.collector), matFor=M(C.forsun), matPod=M(C.podvod),
 matBrs=M(C.brs,{metalness:0.5,roughness:0.4}), matShlang=M(C.shlang,{metalness:0.15,roughness:0.65}),
 matDisk=M(C.disk), matPer=M(C.perehod), matPerT=M(C.perehod,{transparent:true,opacity:0.2}), matVent=M(C.vent,{metalness:0.1,roughness:0.7}),
 matHomut=M(C.homut), matRama=M(C.rama,{metalness:0.35,roughness:0.55}), matNap=M(C.naprav),
 matPod2=M(C.poddon,{metalness:0.3,roughness:0.5}), matKran=M(C.kran), matKol=M(C.kolesa,{metalness:0.1,roughness:0.7});
const steelIn=new THREE.MeshStandardMaterial({color:0x24344a,metalness:0.2,roughness:0.6,side:THREE.BackSide});
function perfTexture(){const s=512;const c=document.createElement('canvas');c.width=c.height=s;const x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,s,s);x.fillStyle='#000';const step=s/26;const r=step*0.30;for(let i=0;i<26;i++)for(let j=0;j<26;j++){const ox=(j%2)?step*0.5:0;const cx=i*step+ox+step*0.2,cy=j*step+step*0.2;const dx=cx-s/2,dy=cy-s/2;if(Math.hypot(dx,dy)>s*0.46)continue;x.beginPath();x.arc(cx,cy,r,0,7);x.fill();}return new THREE.CanvasTexture(c);}
matDisk.alphaMap=perfTexture();matDisk.transparent=true;

const root=new THREE.Group();scene.add(root);
const R=1.0, ringR=R+0.34, Rframe=R+0.34, Rf=0.375;
const railTopY=0.5, baseY=-1.0, railY=-0.4;
const PX=(t,r)=>r*Math.sin(t), PZ=(t,r)=>r*Math.cos(t);
const TC=Math.PI/2, winHalf=0.14;
function beam(p0,p1,h,th){const dx=p1[0]-p0[0],dz=p1[2]-p0[2],len=Math.hypot(dx,dz);const m=new THREE.Mesh(new THREE.BoxGeometry(len,h,th),matRama);m.position.set((p0[0]+p1[0])/2,p0[1],(p0[2]+p1[2])/2);m.rotation.y=-Math.atan2(dz,dx);root.add(m);}
beam([-Rframe,railTopY,-Rframe],[Rframe,railTopY,-Rframe],0.12,0.12);beam([-Rframe,railTopY,Rframe],[Rframe,railTopY,Rframe],0.12,0.12);
beam([-Rframe,railTopY,-Rframe],[-Rframe,railTopY,Rframe],0.12,0.12);beam([Rframe,railTopY,-Rframe],[Rframe,railTopY,Rframe],0.12,0.12);
[[-Rframe,-Rframe],[Rframe,-Rframe],[-Rframe,Rframe],[Rframe,Rframe]].forEach(([px,pz])=>{
 const post=new THREE.Mesh(new THREE.BoxGeometry(0.1,railTopY-baseY,0.1),matRama);post.position.set(px,(railTopY+baseY)/2,pz);root.add(post);
 const fork=new THREE.Mesh(new THREE.BoxGeometry(0.13,0.12,0.13),matKol);fork.position.set(px,baseY-0.06,pz);root.add(fork);
 const swivel=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.06,12),matKol);swivel.position.set(px,baseY-0.01,pz);root.add(swivel);
 const wheel=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.06,20),matKol);wheel.rotation.x=Math.PI/2;wheel.position.set(px+0.04,baseY-0.18,pz);root.add(wheel);
 const hubW=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.07,12),new THREE.MeshStandardMaterial({color:0x3a4045,metalness:0.4,roughness:0.5}));hubW.rotation.x=Math.PI/2;hubW.position.set(px+0.04,baseY-0.18,pz);root.add(hubW);
});
beam([-Rframe,railY,-Rframe],[Rframe,railY,-Rframe],0.1,0.1);
const backPanel=new THREE.Mesh(new THREE.BoxGeometry(2*Rframe,0.4,0.04),matRama);backPanel.position.set(0,railY+0.15,-Rframe);root.add(backPanel);
const ps=Rframe-0.16, railShelfY=railY+0.0;
function guideRail(xsign){const inner=ps-0.02,outer=Rframe,wsh=outer-inner,cx=xsign*(inner+outer)/2;const shelf=new THREE.Mesh(new THREE.BoxGeometry(wsh,0.03,2*Rframe*0.92),matNap);shelf.position.set(cx,railShelfY,0);root.add(shelf);const wallv=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.16,2*Rframe*0.92),matNap);wallv.position.set(xsign*(outer-0.02),railShelfY+0.09,0);root.add(wallv);}
guideRail(1);guideRail(-1);

const pipeBot=railTopY+0.10, pipeTop=railTopY+3.0;
const winYC=pipeBot+0.45, winH=0.34, winYbot=winYC-winH/2, winYtop=winYC+winH/2;
const lowH=winYbot-pipeBot, low=new THREE.Mesh(new THREE.CylinderGeometry(R,R,lowH,64,1,true),matCorpus);low.position.y=(winYbot+pipeBot)/2;root.add(low);
const upH=pipeTop-winYtop, up=new THREE.Mesh(new THREE.CylinderGeometry(R,R,upH,64,1,true),matCorpus);up.position.y=(pipeTop+winYtop)/2;root.add(up);
const midArc=new THREE.Mesh(new THREE.CylinderGeometry(R,R,winH,64,1,true,TC+winHalf,Math.PI*2-2*winHalf),matCorpus);midArc.position.y=winYC;root.add(midArc);
const inAll=new THREE.Mesh(new THREE.CylinderGeometry(R-0.025,R-0.025,pipeTop-pipeBot,64,1,true),steelIn);inAll.position.y=(pipeTop+pipeBot)/2;root.add(inAll);
const corpusParts=[low,up,midArc];
const frEdge=new THREE.MeshStandardMaterial({color:0x8f4a45,metalness:0.3,roughness:0.5});
const t1=TC-winHalf,t2=TC+winHalf;
[t1,t2].forEach(t=>{const e=new THREE.Mesh(new THREE.BoxGeometry(0.022,winH,0.04),frEdge);e.position.set(PX(t,R),winYC,PZ(t,R));e.rotation.y=-(Math.PI/2-t);root.add(e);});
[winYtop,winYbot].forEach(yy=>{const a=[PX(t1,R),PZ(t1,R)],b=[PX(t2,R),PZ(t2,R)];const len=Math.hypot(b[0]-a[0],b[1]-a[1]);const e=new THREE.Mesh(new THREE.BoxGeometry(len,0.022,0.04),frEdge);e.position.set((a[0]+b[0])/2,yy,(a[1]+b[1])/2);e.rotation.y=-Math.atan2(b[1]-a[1],b[0]-a[0]);root.add(e);});
const lipBot=new THREE.Mesh(new THREE.TorusGeometry(R,0.025,8,48),matCorpus);lipBot.rotation.x=Math.PI/2;lipBot.position.y=pipeBot;root.add(lipBot);
const ringGeoM=new THREE.RingGeometry(R+0.005,ringR,48);
const ringTopM=new THREE.Mesh(ringGeoM,matKrep);ringTopM.rotation.x=-Math.PI/2;ringTopM.position.y=pipeBot+0.04;root.add(ringTopM);
const ringBotM=new THREE.Mesh(ringGeoM,matKrep);ringBotM.rotation.x=Math.PI/2;ringBotM.position.y=pipeBot-0.04;root.add(ringBotM);
const ringEdgeM=new THREE.Mesh(new THREE.CylinderGeometry(ringR,ringR,0.08,48,1,true),matKrep);ringEdgeM.position.y=pipeBot;root.add(ringEdgeM);

const Rring=0.66, ringCY=pipeBot+0.26, tubeR=0.05;
const torus=new THREE.Mesh(new THREE.TorusGeometry(Rring,tubeR,14,64),matColl);torus.rotation.x=Math.PI/2;torus.position.y=ringCY;root.add(torus);
const N=5;const tips=[];
for(let i=0;i<N;i++){const a=TC+(i+0.5)*(2*Math.PI/N);const fx=PX(a,Rring),fz=PZ(a,Rring);
 const riser=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.18,12),matColl);riser.position.set(fx,ringCY+0.13,fz);root.add(riser);
 const body=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.09,12),matFor);body.position.set(fx,ringCY+0.25,fz);root.add(body);
 const tip=new THREE.Mesh(new THREE.ConeGeometry(0.05,0.1,12),matFor);tip.position.set(fx,ringCY+0.34,fz);root.add(tip);
 tips.push([fx,ringCY+0.4,fz]);
}
for(let i=0;i<3;i++){const a=TC+Math.PI*0.5+i*(2*Math.PI/3);const mx=PX(a,(Rring+R)/2),mz=PZ(a,(Rring+R)/2);const br2=new THREE.Mesh(new THREE.BoxGeometry(R-Rring,0.03,0.05),matColl);br2.position.set(mx,ringCY,mz);br2.rotation.y=-(Math.PI/2-a);root.add(br2);}
const seg1=new THREE.Mesh(new THREE.CylinderGeometry(tubeR,tubeR,R-Rring+0.05,12),matPod);seg1.position.set((Rring+R)/2,ringCY,0);seg1.rotation.z=Math.PI/2;root.add(seg1);
const upT=new THREE.Mesh(new THREE.CylinderGeometry(tubeR,tubeR,winYC-ringCY,12),matPod);upT.position.set(R-0.06,(winYC+ringCY)/2,0);root.add(upT);
const hout=new THREE.Mesh(new THREE.CylinderGeometry(tubeR,tubeR,0.3,12),matPod);hout.position.set(R+0.1,winYC,0);hout.rotation.z=Math.PI/2;root.add(hout);
const brsTop=new THREE.Mesh(new THREE.CylinderGeometry(0.075,0.075,0.12,16),matBrs);brsTop.position.set(R+0.28,winYC,0);brsTop.rotation.z=Math.PI/2;root.add(brsTop);
const brsBot=new THREE.Mesh(new THREE.CylinderGeometry(0.085,0.085,0.13,16),matBrs);brsBot.position.set(R+0.42,winYC,0);brsBot.rotation.z=Math.PI/2;root.add(brsBot);
const hoseCurve=new THREE.CatmullRomCurve3([new THREE.Vector3(R+0.5,winYC,0),new THREE.Vector3(R+0.78,winYC-0.12,0.04),new THREE.Vector3(R+0.92,winYC-0.5,0.02),new THREE.Vector3(R+0.88,winYC-1.0,-0.02),new THREE.Vector3(R+0.7,winYC-1.45,0),new THREE.Vector3(R+0.5,winYC-1.7,0.05)]);
root.add(new THREE.Mesh(new THREE.TubeGeometry(hoseCurve,80,0.055,14,false),matShlang));
const ribMat=new THREE.MeshStandardMaterial({color:0x232930,metalness:0.15,roughness:0.7});
for(let i=1;i<26;i++){const u=i/26;const p=hoseCurve.getPointAt(u);const tg=hoseCurve.getTangentAt(u);const rib=new THREE.Mesh(new THREE.TorusGeometry(0.062,0.012,8,16),ribMat);rib.position.copy(p);rib.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),tg.clone().normalize());root.add(rib);}
const hoseEnd=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,0.12,14),matBrs);hoseEnd.position.copy(hoseCurve.getPointAt(1));root.add(hoseEnd);

const discGrp=new THREE.Group();root.add(discGrp);
const discY=pipeTop-0.18;
const seatRing=new THREE.Mesh(new THREE.TorusGeometry(R-0.04,0.03,10,48),matDisk);seatRing.rotation.x=Math.PI/2;seatRing.position.y=discY-0.04;discGrp.add(seatRing);
const disc=new THREE.Mesh(new THREE.CircleGeometry(R-0.05,48),matDisk);disc.rotation.x=-Math.PI/2;disc.position.y=discY;discGrp.add(disc);
const bar=new THREE.Mesh(new THREE.TorusGeometry(0.25,0.022,8,20,Math.PI),matDisk);bar.position.set(0,discY+0.05,0);discGrp.add(bar);

const transGrp=new THREE.Group();root.add(transGrp);
const redH=0.7, redY0=pipeTop, redY1=pipeTop+redH;
const red=new THREE.Mesh(new THREE.CylinderGeometry(Rf,R,redH,48,1,true),matPer);red.position.y=(redY0+redY1)/2;transGrp.add(red);
const clamp=new THREE.Mesh(new THREE.TorusGeometry(R+0.04,0.05,10,48),matHomut);clamp.rotation.x=Math.PI/2;clamp.position.y=pipeTop;transGrp.add(clamp);
const clampLock=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.16,0.12),matHomut);clampLock.position.set(0,pipeTop,R+0.06);transGrp.add(clampLock);
const fanY0=redY1, fanY1=redY1+0.6, fanMidY=(fanY0+fanY1)/2;
const fan=new THREE.Mesh(new THREE.CylinderGeometry(Rf,Rf,0.6,32,1,true),matVent);fan.position.y=fanMidY;transGrp.add(fan);
const fanRim=new THREE.Mesh(new THREE.TorusGeometry(Rf,0.04,10,32),matVent);fanRim.rotation.x=Math.PI/2;fanRim.position.y=fanY1;transGrp.add(fanRim);
const bladeGrp=new THREE.Group();bladeGrp.position.y=fanMidY;transGrp.add(bladeGrp);
const hub=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.14,16),matVent);bladeGrp.add(hub);
for(let i=0;i<7;i++){const bl=new THREE.Mesh(new THREE.BoxGeometry(0.28,0.014,0.1),matVent);const a=i/7*Math.PI*2;bl.position.set(Math.cos(a)*0.22,0,Math.sin(a)*0.22);bl.rotation.y=a;bl.rotation.z=0.4;bladeGrp.add(bl);}

const panGrp=new THREE.Group();root.add(panGrp);
const ph=0.4, pt=0.05, pz=Rframe*0.86, drainR=0.1, floorY=railShelfY+0.05;
const shape=new THREE.Shape();shape.moveTo(-ps,-pz);shape.lineTo(ps,-pz);shape.lineTo(ps,pz);shape.lineTo(-ps,pz);shape.lineTo(-ps,-pz);
const hole=new THREE.Path();hole.absarc(-0.25,0,drainR,0,Math.PI*2,true);shape.holes.push(hole);
const pfloor=new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:pt,bevelEnabled:false}),matPod2);pfloor.rotation.x=-Math.PI/2;pfloor.position.y=floorY;panGrp.add(pfloor);
const drainCollar=new THREE.Mesh(new THREE.CylinderGeometry(drainR,drainR,0.06,20,1,true),matPod2);drainCollar.position.set(-0.25,floorY+0.03,0);panGrp.add(drainCollar);
function pwall(w,x,y,z,ry){const m=new THREE.Mesh(new THREE.BoxGeometry(w,ph,pt),matPod2);m.position.set(x,y,z);m.rotation.y=ry;panGrp.add(m);}
pwall(2*ps,0,floorY+ph/2,pz,0);pwall(2*ps,0,floorY+ph/2,-pz,0);pwall(2*pz,ps,floorY+ph/2,0,Math.PI/2);pwall(2*pz,-ps,floorY+ph/2,0,Math.PI/2);
const handle=new THREE.Mesh(new THREE.TorusGeometry(0.16,0.025,10,24,Math.PI),matPod2);handle.rotation.x=Math.PI/2;handle.position.set(0,floorY+ph*0.55,pz+0.12);panGrp.add(handle);
[-0.16,0.16].forEach(hx=>{const leg2=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,0.16,8),matPod2);leg2.rotation.x=Math.PI/2;leg2.position.set(hx,floorY+ph*0.55,pz+0.06);panGrp.add(leg2);});
const dvX=-0.25;
const dp=new THREE.Mesh(new THREE.CylinderGeometry(drainR*0.85,drainR*0.85,0.18,14),matKran);dp.position.set(dvX,railShelfY-0.05,0);panGrp.add(dp);
const ball=new THREE.Mesh(new THREE.SphereGeometry(0.12,16,12),matKran);ball.position.set(dvX,railShelfY-0.2,0);panGrp.add(ball);
const spout=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.055,0.18,12),matKran);spout.position.set(dvX,railShelfY-0.36,0);panGrp.add(spout);
const leverK=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.035,0.05),matKran);leverK.position.set(dvX-0.15,railShelfY-0.2,0);panGrp.add(leverK);
const waterFilm=new THREE.Mesh(new THREE.BoxGeometry(2*ps-0.06,0.02,2*pz-0.06),new THREE.MeshStandardMaterial({color:0x3f7da0,transparent:true,opacity:0.5,metalness:0.2,roughness:0.3}));waterFilm.position.set(0,floorY+0.06,0);panGrp.add(waterFilm);

const mistN=260, mistPos=new Float32Array(mistN*3), mistD=[];
function spawnMist(i){const tp=tips[(Math.random()*tips.length)|0];mistD[i]={x:tp[0]+(Math.random()-0.5)*0.05,y:tp[1]+Math.random()*0.1,z:tp[2]+(Math.random()-0.5)*0.05,vx:(Math.random()-0.5)*0.004,vy:0.008+Math.random()*0.012,vz:(Math.random()-0.5)*0.004};}
for(let i=0;i<mistN;i++){spawnMist(i);mistD[i].y=ringCY+0.4+Math.random()*(discY-ringCY-0.5);mistPos[i*3]=mistD[i].x;mistPos[i*3+1]=mistD[i].y;mistPos[i*3+2]=mistD[i].z;}
const mistGeo=new THREE.BufferGeometry();mistGeo.setAttribute('position',new THREE.BufferAttribute(mistPos,3));
const mistPts=new THREE.Points(mistGeo,new THREE.PointsMaterial({color:0xcfe6ee,size:0.07,transparent:true,opacity:0.5,depthWrite:false,sizeAttenuation:true}));root.add(mistPts);
const watN=170, watPos=new Float32Array(watN*3), watD=[];
function spawnWat(i){const a=Math.random()*Math.PI*2;const rr=R-0.03-Math.random()*0.04;watD[i]={a:a,r:rr,y:discY-0.1-Math.random()*0.3,vy:0.012+Math.random()*0.018};}
for(let i=0;i<watN;i++){spawnWat(i);watD[i].y=pipeBot+0.1+Math.random()*(discY-pipeBot-0.3);const d=watD[i];watPos[i*3]=PX(d.a,d.r);watPos[i*3+1]=d.y;watPos[i*3+2]=PZ(d.a,d.r);}
const watGeo=new THREE.BufferGeometry();watGeo.setAttribute('position',new THREE.BufferAttribute(watPos,3));
const watPts=new THREE.Points(watGeo,new THREE.PointsMaterial({color:0x5aa0c8,size:0.05,transparent:true,opacity:0.75,depthWrite:false,sizeAttenuation:true}));root.add(watPts);

root.position.y=-0.4;
const VIEWS={iso:[0.6,0.28],front:[0,0.05],rightS:[Math.PI/2,0.05],top:[0.4,1.45]};
let ry=0.6,rx=0.28,tRy=0.6,tRx=0.28,dist=15,spin=true,drag=false,px=0,py=0,pinch=0;
let openV=0,openT=0,discV=0,discT=0,panV=0,panT=0,proc=true,transparent=false;
function updCorpus(){const m=proc?matCorpusP:(transparent?matCorpusT:matCorpus);corpusParts.forEach(p=>p.material=m);red.material=(transparent||proc)?matPerT:matPer;}
function setView(v){const a=VIEWS[v];if(!a)return;tRy=a[0];tRx=a[1];spin=false;updRotBtn();}
document.querySelectorAll('[data-v]').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.v)));
const rotBtn=document.getElementById('rot');function updRotBtn(){rotBtn.textContent=(spin?'⏸':'▶')+' Вращение';rotBtn.classList.toggle('on',spin);}
rotBtn.addEventListener('click',()=>{spin=!spin;updRotBtn();});
const procBtn=document.getElementById('proc');function updProc(){procBtn.textContent=(proc?'⏸':'▶')+' Туман и вода';procBtn.classList.toggle('on',proc);mistPts.visible=proc;watPts.visible=proc;waterFilm.visible=proc;updCorpus();}
procBtn.addEventListener('click',()=>{proc=!proc;updProc();});
const openBtn=document.getElementById('open');openBtn.addEventListener('click',()=>{openT=openT?0:1;openBtn.classList.toggle('on',!!openT);});
const discBtn=document.getElementById('disc');discBtn.addEventListener('click',()=>{discT=discT?0:1;if(discT){openT=1;openBtn.classList.add('on');}discBtn.classList.toggle('on',!!discT);});
const panBtn=document.getElementById('pan');panBtn.addEventListener('click',()=>{panT=panT?0:1;panBtn.classList.toggle('on',!!panT);});
const cutBtn=document.getElementById('cut');cutBtn.addEventListener('click',()=>{transparent=!transparent;cutBtn.classList.toggle('on',transparent);updCorpus();});
host.addEventListener('mousedown',e=>{drag=true;spin=false;updRotBtn();px=e.clientX;py=e.clientY;host.style.cursor='grabbing';});
addEventListener('mouseup',()=>{drag=false;host.style.cursor='grab';});
addEventListener('mousemove',e=>{if(!drag)return;tRy+=(e.clientX-px)*0.01;tRx+=(e.clientY-py)*0.01;tRx=Math.max(-0.6,Math.min(1.45,tRx));px=e.clientX;py=e.clientY;});
host.addEventListener('wheel',e=>{e.preventDefault();dist=Math.max(2.5,Math.min(30,dist+e.deltaY*0.012));},{passive:false});
host.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;spin=false;updRotBtn();px=e.touches[0].clientX;py=e.touches[0].clientY;}else if(e.touches.length===2){drag=false;pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
host.addEventListener('touchend',()=>{drag=false;pinch=0;});
host.addEventListener('touchmove',e=>{if(e.touches.length===2){const dd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(pinch)dist=Math.max(2.5,Math.min(30,dist-(dd-pinch)*0.03));pinch=dd;e.preventDefault();}else if(drag&&e.touches.length===1){tRy+=(e.touches[0].clientX-px)*0.01;tRx+=(e.touches[0].clientY-py)*0.01;tRx=Math.max(-0.6,Math.min(1.45,tRx));px=e.touches[0].clientX;py=e.touches[0].clientY;}},{passive:false});
const mAttr=mistGeo.attributes.position, wAttr=watGeo.attributes.position;
function loop(){requestAnimationFrame(loop);if(spin&&!drag)tRy+=0.005;
 ry+=(tRy-ry)*0.12; rx+=(tRx-rx)*0.12;
 openV+=(openT-openV)*0.08; transGrp.position.y=openV*1.3;
 discV+=(discT-discV)*0.07; const upPart=Math.min(discV/0.45,1), outPart=Math.max((discV-0.45)/0.55,0); discGrp.position.y=upPart*0.7; discGrp.position.x=outPart*1.9;
 panV+=(panT-panV)*0.1; panGrp.position.z=panV*2.3;
 if(proc){ bladeGrp.rotation.y+=0.35;
  for(let i=0;i<mistN;i++){const d=mistD[i];d.y+=d.vy;d.x+=d.vx;d.z+=d.vz;const rr=Math.hypot(d.x,d.z);if(rr>R-0.08){d.x*=(R-0.08)/rr;d.z*=(R-0.08)/rr;}if(d.y>discY-0.12)spawnMist(i);mAttr.array[i*3]=d.x;mAttr.array[i*3+1]=d.y;mAttr.array[i*3+2]=d.z;}
  mAttr.needsUpdate=true;
  for(let i=0;i<watN;i++){const d=watD[i];d.y-=d.vy;if(d.y<pipeBot+0.06)spawnWat(i);wAttr.array[i*3]=PX(d.a,d.r);wAttr.array[i*3+1]=d.y;wAttr.array[i*3+2]=PZ(d.a,d.r);}
  wAttr.needsUpdate=true;
 }
 cam.position.x=Math.sin(ry)*Math.cos(rx)*dist;cam.position.z=Math.cos(ry)*Math.cos(rx)*dist;cam.position.y=Math.sin(rx)*dist+1.3;cam.lookAt(0,1.05,0);rnd.render(scene,cam);}
updRotBtn();updProc();loop();
addEventListener('resize',()=>{const [w,h]=size();rnd.setSize(w,h,false);cam.aspect=w/h;cam.updateProjectionMatrix();});
})();
</script>
</body>
</html>
